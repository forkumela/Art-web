<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Araras</title>

<style>
:root {
  --yellow: #ffdf00;
  --green: #009739;
  --dark: #003f1f;
  --bg: #fffbea;
}

body {
  margin:0;
  font-family: Georgia, serif;
  background: var(--bg);
}

.container {
  max-width:1200px;
  margin:auto;
  background:#fff;
}

/* HEADER */
.site-header {
  position:relative;
  padding:2rem;
  background: linear-gradient(135deg, #ffdf00, #009739);
  color: var(--dark);
}

.site-title {
  font-size:2.5rem;
  font-weight:bold;
}

.site-subtitle {
  margin-top:10px;
  font-style:italic;
}

/* FLAGS */
.language-switcher {
  position:absolute;
  top:15px;
  right:20px;
  display:flex;
  gap:10px;
}

.language-switcher button {
  width:45px;
  height:32px;
  font-size:18px;
  border-radius:6px;
  border:none;
  cursor:pointer;
  background:#fff;
}

.language-switcher button.active {
  border:2px solid black;
}

/* NAV */
.nav-menu {
  background: var(--green);
  text-align:center;
}

.nav-menu a {
  color:white;
  padding:12px;
  display:inline-block;
  text-decoration:none;
}

.nav-menu a:hover {
  background: var(--yellow);
  color:black;
}

/* CONTENT */
.main-content {
  padding:20px;
}

/* GRID */
.art-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.art-card {
  border:1px solid #ddd;
  padding:10px;
  text-align:center;
}

.placeholder {
  height:150px;
  background:#eee;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* FOOTER */
footer {
  text-align:center;
  padding:15px;
  background: var(--green);
  color:white;
}
</style>
</head>

<body>

<div class="container">

<header class="site-header">

<div class="language-switcher">
<button data-lang="de" class="active">🇩🇪</button>
<button data-lang="en">🇬🇧</button>
<button data-lang="pt">🇧🇷</button>
</div>

<h1 class="site-title">Araras</h1>
<div class="site-subtitle" id="subtitle"></div>

</header>

<nav class="nav-menu">
<a href="#" onclick="loadPage('start')">Home</a>
<a href="#" onclick="loadPage('oil')">Öl</a>
<a href="#" onclick="loadPage('water')">Aquarell</a>
<a href="#" onclick="loadPage('contact')">Kontakt</a>
</nav>

<main class="main-content" id="content"></main>

<footer>
© 2026 Araras
</footer>

</div>

<script>

let lang = "de";

const text = {
de:{
subtitle:"Ölmalerei · Aquarelle · Radierungen",
home:"Willkommen auf der Kunstseite von Araras.",
contact:"Kontakt: info@araras.de"
},
en:{
subtitle:"Oil Paintings · Watercolors · Etchings",
home:"Welcome to the art page of Araras.",
contact:"Contact: info@araras.de"
},
pt:{
subtitle:"Pintura a óleo · Aquarelas · Gravuras",
home:"Bem-vindo à página de arte de Araras.",
contact:"Contato: info@araras.de"
}
};

function updateLang() {
document.getElementById("subtitle").innerText = text[lang].subtitle;
loadPage("start");
}

document.querySelectorAll(".language-switcher button").forEach(btn=>{
btn.onclick=()=>{
lang = btn.dataset.lang;
document.querySelectorAll(".language-switcher button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
updateLang();
};
});

function loadPage(page){

if(page==="start"){
document.getElementById("content").innerHTML=`
<p>${text[lang].home}</p>
<div class="art-grid">
<div class="art-card"><div class="placeholder">🎨</div><h3>Art 1</h3></div>
<div class="art-card"><div class="placeholder">🎨</div><h3>Art 2</h3></div>
</div>`;
}

if(page==="contact"){
document.getElementById("content").innerHTML=`
<p>${text[lang].contact}</p>`;
}

}

updateLang();

</script>

</body>
</html>
